name: CI/CD Pipeline

"on":
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js application
        run: npm run build
        env:
          MONGODB_URI: mongodb://placeholder:27017/placeholder

  release:
    name: Release and Deploy
    runs-on: ubuntu-latest
    needs: [ build ]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      # Semantic Release
      - name: Semantic Release
        id: semantic_release
        run: |
          npx semantic-release

          # Check if version file was created by @semantic-release/exec
          if [ -f .VERSION ]; then
            VERSION=$(cat .VERSION)
            echo "New release version: $VERSION"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          else
            echo "No new release created."
            echo "version=" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Docker operations (only if new release)
      - name: Log in to Docker registry
        if: ${{ steps.semantic_release.outputs.version != '' }}
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_PASS }}

      - name: Build Docker image
        if: ${{ steps.semantic_release.outputs.version != '' }}
        run: |
          BUILD_DATE=$(TZ=Europe/Berlin date +"%d.%m.%Y %H:%M")
          docker build \
            --build-arg VERSION=${{ steps.semantic_release.outputs.version }} \
            --build-arg BUILD_DATE="${BUILD_DATE}" \
            -t docker.io/darthkali/weemeal:${{ steps.semantic_release.outputs.version }} \
            -t docker.io/darthkali/weemeal:latest \
            .

      - name: Push Docker image
        if: ${{ steps.semantic_release.outputs.version != '' }}
        run: |
          docker push docker.io/darthkali/weemeal:${{ steps.semantic_release.outputs.version }}
          docker push docker.io/darthkali/weemeal:latest
